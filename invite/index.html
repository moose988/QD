<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Wedding Invitation</title>
  <meta name="theme-color" content="#0c0c0f">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/invite/invite.css">
</head>
<body>
  <div class="invite-shell">
    <div class="invite-bg" aria-hidden="true"></div>
    <div class="invite-particles" id="invite-particles" aria-hidden="true"></div>

    <header class="invite-topbar" id="invite-topbar" hidden>
      <div class="invite-topbar-spacer" aria-hidden="true"></div>
      <div class="invite-topbar-actions">
        <button class="invite-lang-toggle" type="button" id="invite-lang-toggle" aria-label="Switch language">AR</button>
        <button class="invite-audio-toggle" type="button" id="invite-audio-toggle" hidden aria-label="Music control">
          <span class="invite-audio-icon" aria-hidden="true">♫</span>
        </button>
      </div>
    </header>

    <main class="invite-main">
      <section class="invite-loading" id="invite-loading">
        <div class="invite-loading-card">
          <div class="invite-loading-badge" id="invite-loading-badge">Preparing invitation</div>
          <h1 id="invite-loading-title">Loading celebration details...</h1>
        </div>
      </section>

      <section class="invite-empty" id="invite-empty" hidden></section>

      <section class="invite-opening" id="invite-opening" hidden>
        <div class="invite-opening-glow" aria-hidden="true"></div>
        <div class="invite-opening-envelope" aria-hidden="true">
          <div class="invite-opening-envelope-flap"></div>
          <div class="invite-opening-envelope-body"></div>
        </div>
        <div class="invite-opening-card">
          <p class="invite-opening-welcome" id="invite-opening-welcome">Welcome</p>
          <p class="invite-opening-sub" id="invite-opening-sub"></p>
          <button class="invite-opening-btn" type="button" id="invite-opening-btn">
            <span id="invite-opening-btn-text">Press to Open</span>
          </button>
        </div>
      </section>

      <article class="invite-page" id="invite-page" hidden>
        <section class="invite-hero">
          <div class="invite-hero-media" id="invite-hero-media"></div>
          <div class="invite-hero-overlay"></div>
          <div class="invite-hero-content invite-frame">
            <div class="invite-hero-inner">
              <div class="invite-kicker" id="invite-kicker"></div>
              <h1 class="invite-couple" id="invite-couple"></h1>
              <p class="invite-title" id="invite-title"></p>
              <div class="invite-event-meta">
                <div class="invite-meta-line" id="invite-date"></div>
                <div class="invite-meta-line" id="invite-time"></div>
              </div>
              <div class="invite-hero-actions">
                <a class="invite-btn invite-btn-ghost" id="invite-location-btn" target="_blank" rel="noreferrer noopener" hidden></a>
                <a class="invite-btn invite-btn-ghost" id="invite-waze-btn" target="_blank" rel="noreferrer noopener" hidden></a>
                <button class="invite-btn invite-btn-ghost" type="button" id="invite-calendar-btn" hidden></button>
                <button class="invite-btn invite-btn-ghost" type="button" id="invite-whatsapp-btn" hidden></button>
              </div>
            </div>
          </div>
        </section>

        <div class="invite-frame invite-story">
          <section class="invite-section invite-countdown-section" id="invite-countdown-section">
            <div class="invite-section-head">
              <span class="invite-section-label" id="invite-countdown-label"></span>
              <h2 id="invite-countdown-heading"></h2>
            </div>
            <div class="invite-countdown-grid" id="invite-countdown-grid">
              <article class="invite-count-card">
                <strong id="count-days">--</strong>
                <span id="label-days"></span>
              </article>
              <article class="invite-count-card">
                <strong id="count-hours">--</strong>
                <span id="label-hours"></span>
              </article>
              <article class="invite-count-card">
                <strong id="count-minutes">--</strong>
                <span id="label-minutes"></span>
              </article>
              <article class="invite-count-card">
                <strong id="count-seconds">--</strong>
                <span id="label-seconds"></span>
              </article>
            </div>
            <p class="invite-countdown-note" id="invite-countdown-note"></p>
          </section>

          <section class="invite-section invite-venue-section" id="invite-venue-section">
            <div class="invite-section-head">
              <span class="invite-section-label" id="invite-location-label"></span>
              <h2 id="invite-venue-name"></h2>
            </div>
            <p class="invite-venue-address" id="invite-venue-address"></p>
            <div class="invite-venue-actions">
              <a class="invite-location-link" id="invite-location-link" target="_blank" rel="noreferrer noopener" hidden></a>
              <a class="invite-location-link invite-waze-link" id="invite-waze-link" target="_blank" rel="noreferrer noopener" hidden></a>
            </div>
          </section>

          <section class="invite-section invite-gallery-section" id="invite-gallery-section" hidden>
            <div class="invite-section-head">
              <span class="invite-section-label" id="invite-gallery-label"></span>
              <h2 id="invite-gallery-heading"></h2>
            </div>
            <div class="invite-gallery-grid" id="invite-gallery-grid"></div>
          </section>

          <section class="invite-section invite-rsvp-section" id="invite-rsvp-section" hidden>
            <div class="invite-section-head">
              <span class="invite-section-label" id="invite-rsvp-label"></span>
              <h2 id="invite-rsvp-heading"></h2>
            </div>
            <p class="invite-rsvp-deadline" id="invite-rsvp-deadline" hidden></p>
            <p class="invite-rsvp-closed" id="invite-rsvp-closed" hidden></p>
            <form class="invite-rsvp-form" id="invite-rsvp-form">
              <label class="invite-field">
                <span id="label-rsvp-name"></span>
                <input class="invite-input" name="name" type="text" required autocomplete="name">
              </label>
              <label class="invite-field">
                <span id="label-rsvp-phone"></span>
                <input class="invite-input" name="phone" type="tel" inputmode="tel" required autocomplete="tel">
              </label>
              <label class="invite-field">
                <span id="label-rsvp-attending"></span>
                <select class="invite-input" name="attending" required>
                  <option value="" id="option-attending-placeholder" disabled selected></option>
                  <option value="yes" id="option-attending-yes"></option>
                  <option value="no" id="option-attending-no"></option>
                </select>
              </label>
              <label class="invite-field" id="invite-guests-field">
                <span id="label-rsvp-guests"></span>
                <input class="invite-input" name="guests" type="number" min="1" max="50" value="1">
              </label>
              <label class="invite-field invite-field-full">
                <span id="label-rsvp-message"></span>
                <textarea class="invite-input invite-textarea" name="message" rows="4"></textarea>
              </label>
              <div class="invite-rsvp-actions">
                <button class="invite-btn invite-btn-submit" type="submit" id="invite-rsvp-submit"></button>
                <p class="invite-rsvp-feedback" id="invite-rsvp-feedback" role="status" aria-live="polite"></p>
              </div>
            </form>
          </section>
        </div>
      </article>
    </main>

    <audio id="invite-audio-player" preload="none" loop></audio>
  </div>

  <script type="module" src="/invite/invite.js"></script>
</body>
</html>
