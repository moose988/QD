═══════════════════════════════════════════════════════════ -->
<div id="qd-loader" style="position:fixed;inset:0;z-index:9999;background:var(--obsidian);display:grid;place-items:center;transition:opacity 600ms var(--ease-out),visibility 600ms;">
  <div style="text-align:center;font-family:var(--font-display);color:var(--fg1);">
    <div style="font-size:clamp(120px,18vw,240px);font-weight:700;letter-spacing:-0.06em;line-height:0.85;color:transparent;-webkit-text-stroke:2px rgba(166,240,79,0.4);animation:qd-load-pulse 1.4s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(166,240,79,0.4));">QD</div>
    <div style="margin-top:32px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:var(--acid);">
      <span id="qd-loader-text">BOOTING SYSTEM</span><span class="qd-loader-dots"></span>
    </div>
    <div style="width:240px;height:1px;background:rgba(244,241,234,0.1);margin:24px auto 0;position:relative;overflow:hidden;">
      <div id="qd-loader-bar" style="position:absolute;top:0;left:0;height:100%;background:var(--acid);width:0%;transition:width 200ms ease-out;box-shadow:0 0 12px var(--acid);"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var stages=[{p:25,t:'BOOTING SYSTEM'},{p:55,t:'LOADING MODULES'},{p:80,t:'CALIBRATING'},{p:100,t:'READY'}];
  var i=0;
  function tick(){
    if(i>=stages.length){
      setTimeout(function(){
        var l=document.getElementById('qd-loader');
        l.style.opacity='0'; l.style.visibility='hidden';
        setTimeout(function(){l.remove();},600);
      },250); return;
    }
    document.getElementById('qd-loader-bar').style.width=stages[i].p+'%';
    document.getElementById('qd-loader-text').textContent=stages[i].t;
    i++; setTimeout(tick,380);
  }
  if(document.readyState!=='loading') tick();
  else document.addEventListener('DOMContentLoaded',tick);
})();
</script>

const MOBILE_BREAKPOINT = 760;

const useViewportFlag = (breakpoint = MOBILE_BREAKPOINT) => {
  const [matches, setMatches] = useState(() => window.innerWidth <= breakpoint);
  useEffect(() => {
    const media = window.matchMedia(`(max-width: ${breakpoint}px)`);
    const update = () => setMatches(media.matches);
    update();
    if (media.addEventListener) media.addEventListener('change', update);
    else media.addListener(update);
    return () => {
      if (media.removeEventListener) media.removeEventListener('change', update);
      else media.removeListener(update);
    };
  }, [breakpoint]);
  return matches;
};

const usePrefersReducedMotion = () => {
  const [reduced, setReduced] = useState(() => window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  useEffect(() => {
    const media = window.matchMedia('(prefers-reduced-motion: reduce)');
    const update = () => setReduced(media.matches);
    update();
    if (media.addEventListener) media.addEventListener('change', update);
    else media.addListener(update);
    return () => {
      if (media.removeEventListener) media.removeEventListener('change', update);
      else media.removeListener(update);
    };
  }, []);
  return reduced;
};

// ── Reveal ──────────────────────────────────────────────────
const Reveal = ({ children, delay=0, lift=32, duration=800, once=true, as:Tag='div', style, ...rest }) => {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  const isMobile = useViewportFlag();
  const prefersReducedMotion = usePrefersReducedMotion();
  const effectiveDelay = prefersReducedMotion ? 0 : (isMobile ? Math.min(delay, 80) : delay);
  const effectiveLift = prefersReducedMotion ? 0 : (isMobile ? Math.min(lift, 18) : lift);
  const effectiveDuration = prefersReducedMotion ? 1 : (isMobile ? Math.min(duration, 520) : duration);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { setShown(true); if (once) io.unobserve(e.target); }
        else if (!once) setShown(false);
      });
    }, { threshold: isMobile ? 0.08 : 0.15, rootMargin: isMobile ? '0px 0px -4% 0px' : '0px 0px -10% 0px' });
    io.observe(el); return () => io.disconnect();
  }, [isMobile, once]);
  return (
    <Tag ref={ref} style={{
      ...style,
      opacity: shown ? 1 : 0,
      transform: shown ? 'translateY(0)' : `translateY(${effectiveLift}px)`,
      transition: `opacity ${effectiveDuration}ms cubic-bezier(0.22,1,0.36,1) ${effectiveDelay}ms, transform ${effectiveDuration}ms cubic-bezier(0.22,1,0.36,1) ${effectiveDelay}ms`,
      willChange: shown ? 'auto' : 'opacity, transform',
    }} {...rest}>{children}</Tag>
  );
};

// ── Stagger ──────────────────────────────────────────────────
const Stagger = ({ children, step=80, base=0, lift=32, duration=800 }) =>
  Children.toArray(children).map((child, i) =>
    <Reveal key={i} delay={base+i*step} lift={lift} duration={duration}>{child}</Reveal>
  );

// ── Marquee ──────────────────────────────────────────────────
const Marquee = ({ children, speed=45, style, className='' }) => (
  <div className={className} style={{ overflow:'hidden', position:'relative', ...style }}>
    <div className="qd-marquee-track" style={{ animationDuration:`${speed}s` }}>
      {children}{children}
    </div>
  </div>
);

// ── Eyebrow ──────────────────────────────────────────────────
const Eyebrow = ({ children, color }) => (
  <div className="qd-eyebrow" style={color ? { color } : {}}>{children}</div>
);

// ── Btn ──────────────────────────────────────────────────────
const Btn = ({ variant='primary', size='md', children, onClick, icon, className='' }) => (
  <button onClick={onClick} className={`qd-btn qd-btn-${variant} qd-btn-${size} ${className}`.trim()}>
    {children}{icon && <span style={{fontWeight:400}}>{icon}</span>}
  </button>
);

// ── Tag ──────────────────────────────────────────────────────
const Tag = ({ children }) => <span className="qd-tag">{children}</span>;

// ── Hooks ────────────────────────────────────────────────────
const useInView = (ref, threshold=0.2) => {
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { setSeen(true); io.disconnect(); } });
    }, { threshold });
    io.observe(ref.current); return () => io.disconnect();
  }, []);
  return seen;
};

const useMouseTilt = (ref) => {
  const [m, setM] = useState({ x:0, y:0 });
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const disableTilt = window.matchMedia('(hover: none), (pointer: coarse), (max-width: 768px), (prefers-reduced-motion: reduce)').matches;
    if (disableTilt) return;
    const onMove = e => {
      const r = el.getBoundingClientRect();
      setM({ x:((e.clientX-r.left)/r.width-0.5)*2, y:((e.clientY-r.top)/r.height-0.5)*2 });
    };
    const onLeave = () => setM({ x:0, y:0 });
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => { el.removeEventListener('mousemove', onMove); el.removeEventListener('mouseleave', onLeave); };
  }, []);
  return m;
};

const useScrollProgress = (ref) => {
  const [p, setP] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      if (!ref.current) return;
      const r = ref.current.getBoundingClientRect(), vh = window.innerHeight;
      setP(Math.max(-1, Math.min(1, (r.top+r.height/2-vh/2)/(vh/2+r.height/2))));
    };
    window.addEventListener('scroll', onScroll, { passive:true }); onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return p;
};

window.__QD = { Reveal, Stagger, Marquee, Eyebrow, Btn, Tag, useInView, useMouseTilt, useScrollProgress, useViewportFlag, usePrefersReducedMotion, HOMEPAGE_COPY };

// ── DashboardMini ─────────────────────────────────────────
const DashboardMini = () => {

// ── CountUp ───────────────────────────────────────────────
const CountUp = ({ end, prefix='', suffix='', duration=1400 }) => {
  const ref = useRef(null);
  const [val, setVal] = useState(0);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        const start = performance.now();
        const tick = now => {
          const p = Math.min(1,(now-start)/duration);
          setVal(end*(1-Math.pow(1-p,3)));
          if (p<1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick); io.disconnect();
      }
    },{ threshold:0.4 });
    io.observe(el); return () => io.disconnect();
  },[end,duration]);
  return <span ref={ref}>{prefix}{val.toFixed(0)}{suffix}</span>;
};

  const normalizedLanguage = language === 'ar' ? 'ar' : 'en';
  const direction = normalizedLanguage === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = normalizedLanguage;
  document.documentElement.dir = direction;
  document.body.classList.toggle('qd-lang-ar', normalizedLanguage === 'ar');
  document.body.classList.toggle('qd-lang-en', normalizedLanguage !== 'ar');
};

  useEffect(() => {
    localStorage.setItem(window.__QD.LANGUAGE_STORAGE_KEY, language);
    window.__QD.applyLanguageDocumentState(language);
