<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QD · Start a Build</title>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <style>
    body.qd-contact-page {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(166, 240, 79, 0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(166, 240, 79, 0.1), transparent 24%),
        linear-gradient(180deg, rgba(19, 20, 24, 0.96) 0%, rgba(10, 11, 13, 1) 46%, rgba(10, 11, 13, 1) 100%);
      overflow-x: hidden;
    }

    .qd-contact-shell {
      position: relative;
      min-height: 100vh;
      padding: 32px 24px 72px;
    }

    .qd-contact-shell::before,
    .qd-contact-shell::after {
      content: '';
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.55;
    }

    .qd-contact-shell::before {
      width: 360px;
      height: 360px;
      top: -120px;
      left: -80px;
      background: rgba(166, 240, 79, 0.12);
    }

    .qd-contact-shell::after {
      width: 300px;
      height: 300px;
      right: -100px;
      bottom: 60px;
      background: rgba(166, 240, 79, 0.08);
    }

    .qd-contact-header,
    .qd-contact-hero,
    .qd-contact-layout {
      position: relative;
      z-index: 1;
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    .qd-contact-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 52px;
      padding: 14px 18px;
      border: 1px solid var(--border-1);
      background: rgba(10, 11, 13, 0.72);
      backdrop-filter: blur(18px);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .qd-logo-lockup {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      color: var(--fg1);
    }

    .qd-logo-lockup img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 0 0 1px var(--border-1);
    }

    .qd-contact-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .qd-back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-2);
      color: var(--fg2);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: border-color 200ms var(--ease-out), color 200ms var(--ease-out), transform 200ms var(--ease-out);
    }

    .qd-back-link:hover {
      color: var(--acid);
      border-color: rgba(166, 240, 79, 0.55);
      transform: translateY(-1px);
    }

    .qd-language-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid rgba(166, 240, 79, 0.22);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 0 1px rgba(166, 240, 79, 0.06);
    }

    .qd-language-toggle button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--fg3);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 180ms var(--ease-out), color 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
    }

    .qd-language-toggle button.is-active {
      background: var(--acid);
      color: var(--obsidian);
      box-shadow: 0 0 28px rgba(166, 240, 79, 0.28);
    }

    .qd-contact-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 24px;
      align-items: end;
      margin-bottom: 36px;
    }

    .qd-hero-copy h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 9vw, 108px);
      font-weight: 600;
      line-height: 0.9;
      letter-spacing: -0.06em;
      margin: 18px 0 18px;
      color: var(--fg1);
    }

    .qd-hero-copy p {
      max-width: 620px;
      font-size: clamp(18px, 2vw, 24px);
      color: var(--fg2);
      line-height: 1.45;
    }

    .qd-hero-side {
      justify-self: end;
      width: min(100%, 380px);
      padding: 22px;
      border-radius: 22px;
      border: 1px solid rgba(166, 240, 79, 0.22);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(11, 11, 12, 0.72);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.38),
        inset 0 0 0 1px rgba(166, 240, 79, 0.08),
        0 0 40px rgba(166, 240, 79, 0.06);
    }

    .qd-hero-side strong {
      display: block;
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: -0.03em;
      color: var(--fg1);
      margin-bottom: 14px;
    }

    .qd-hero-side p {
      color: var(--fg2);
      font-size: 15px;
      line-height: 1.55;
    }

    .qd-hero-side .qd-pulse-bar {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 1px;
      margin-top: 18px;
      background: rgba(244, 241, 234, 0.08);
    }

    .qd-hero-side .qd-pulse-bar span {
      position: absolute;
      top: 0;
      left: 0;
      width: 38%;
      height: 100%;
      background: var(--acid);
      box-shadow: 0 0 14px var(--acid);
      animation: qd-contact-scan 2.4s ease-in-out infinite;
    }

    .qd-contact-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: start;
    }

    .qd-form-card,
    .qd-summary-card,
    .qd-success-card {
      border-radius: 28px;
      border: 1px solid rgba(166, 240, 79, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        rgba(10, 11, 13, 0.84);
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.45),
        inset 0 0 0 1px rgba(166, 240, 79, 0.06),
        0 0 48px rgba(166, 240, 79, 0.05);
      backdrop-filter: blur(26px);
    }

    .qd-form-card {
      padding: 28px;
    }

    .qd-summary-card {
      position: sticky;
      top: 28px;
      padding: 22px;
    }

    .qd-progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
      color: var(--fg2);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .qd-progress-track {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(244, 241, 234, 0.08);
      margin-bottom: 26px;
    }

    .qd-progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(166, 240, 79, 0.9), rgba(197, 248, 42, 1));
      box-shadow: 0 0 24px rgba(166, 240, 79, 0.45);
      transition: width 380ms var(--ease-out);
    }

    .qd-step-head {
      display: grid;
      gap: 8px;
      margin-bottom: 22px;
    }

    .qd-step-head h2 {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 600;
      letter-spacing: -0.04em;
      line-height: 1.02;
      color: var(--fg1);
    }

    .qd-step-head p {
      color: var(--fg2);
      font-size: 16px;
      line-height: 1.55;
      max-width: 700px;
    }

    .qd-step-shell {
      min-height: 520px;
      display: flex;
      flex-direction: column;
    }

    .qd-step-panel {
      flex: 1;
      animation: qd-contact-rise 420ms var(--ease-out);
    }

    .qd-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .qd-field,
    .qd-review-card {
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(244, 241, 234, 0.08);
      background: rgba(255, 255, 255, 0.025);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.01);
    }

    .qd-field.is-full,
    .qd-review-card {
      grid-column: 1 / -1;
    }

    .qd-field-label {
      display: block;
      margin-bottom: 12px;
      color: var(--fg1);
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .qd-field-note {
      margin-top: -4px;
      margin-bottom: 12px;
      color: var(--fg3);
      font-size: 13px;
      line-height: 1.5;
    }

    .qd-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .qd-label-row .qd-field-label {
      margin-bottom: 0;
    }

    .qd-input-wrap {
      position: relative;
      width: 100%;
    }

    .qd-input-wrap.has-paste .qd-input,
    .qd-input-wrap.has-paste .qd-textarea {
      padding-right: 56px;
    }

    .qd-paste-icon-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      border: 1px solid rgba(166, 240, 79, 0.2);
      background:
        linear-gradient(180deg, rgba(166, 240, 79, 0.075), rgba(255,255,255,0.012)),
        rgba(10, 11, 13, 0.82);
      color: var(--acid);
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.72;
      transition:
        opacity 180ms var(--ease-out),
        transform 180ms var(--ease-out),
        border-color 180ms var(--ease-out),
        box-shadow 180ms var(--ease-out),
        background 180ms var(--ease-out);
    }

    .qd-paste-icon-btn:hover {
      opacity: 1;
      transform: translateY(-1px);
      border-color: rgba(166, 240, 79, 0.62);
      box-shadow: 0 0 22px rgba(166, 240, 79, 0.14);
    }

    .qd-paste-icon-btn:active {
      transform: translateY(0) scale(0.96);
    }

    .qd-required-pill {
      flex: 0 0 auto;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(166, 240, 79, 0.35);
      color: var(--acid);
      background: rgba(166, 240, 79, 0.06);
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .qd-required-pill.is-optional {
      border-color: rgba(244, 241, 234, 0.12);
      color: var(--fg3);
      background: rgba(255, 255, 255, 0.02);
    }

    .qd-required-pill.is-error {
      border-color: rgba(229, 75, 75, 0.55);
      color: var(--err);
      background: rgba(229, 75, 75, 0.08);
    }

    .qd-input,
    .qd-textarea {
      width: 100%;
      border: 1px solid rgba(244, 241, 234, 0.14);
      border-radius: 16px;
      background: rgba(12, 13, 16, 0.95);
      color: var(--fg1);
      padding: 15px 16px;
      font: inherit;
      transition: border-color 180ms var(--ease-out), box-shadow 180ms var(--ease-out), transform 180ms var(--ease-out);
    }

    .qd-input::placeholder,
    .qd-textarea::placeholder {
      color: rgba(74, 79, 90, 0.95);
    }

    .qd-input:focus,
    .qd-textarea:focus {
      outline: none;
      border-color: rgba(166, 240, 79, 0.65);
      box-shadow: 0 0 0 4px rgba(166, 240, 79, 0.08), 0 0 24px rgba(166, 240, 79, 0.09);
      transform: translateY(-1px);
    }

    .qd-textarea {
      min-height: 132px;
      resize: vertical;
    }

    .qd-field.is-error {
      border-color: rgba(229, 75, 75, 0.58);
      background: rgba(229, 75, 75, 0.035);
      box-shadow:
        inset 0 0 0 1px rgba(229, 75, 75, 0.16),
        0 0 28px rgba(229, 75, 75, 0.08);
    }

    .qd-input.is-error,
    .qd-textarea.is-error {
      border-color: rgba(229, 75, 75, 0.78);
      box-shadow: 0 0 0 4px rgba(229, 75, 75, 0.08), 0 0 24px rgba(229, 75, 75, 0.08);
    }

    .qd-options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .qd-options.is-error {
      border-radius: 20px;
      box-shadow: 0 0 0 1px rgba(229, 75, 75, 0.25), 0 0 28px rgba(229, 75, 75, 0.06);
    }

    .qd-error-text {
      margin-top: 10px;
      color: var(--err);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .qd-submit-alert {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(229, 75, 75, 0.32);
      background: linear-gradient(180deg, rgba(229, 75, 75, 0.16), rgba(229, 75, 75, 0.08));
      color: #ffd4d4;
      box-shadow: inset 0 0 0 1px rgba(229, 75, 75, 0.08);
    }

    .qd-submit-alert strong {
      display: block;
      margin-bottom: 4px;
      font-family: var(--font-display);
      font-size: 15px;
      color: var(--fg1);
    }

    .qd-btn[disabled] {
      opacity: 0.62;
      cursor: wait;
      pointer-events: none;
      box-shadow: none !important;
    }

    .qd-color-picker {
      display: grid;
      gap: 16px;
    }

    .qd-color-controls {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .qd-color-wheel {
      width: 88px;
      height: 56px;
      border: 1px solid rgba(244, 241, 234, 0.14);
      border-radius: 16px;
      background: rgba(12, 13, 16, 0.95);
      padding: 6px;
      cursor: pointer;
    }

    .qd-color-wheel::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .qd-color-wheel::-webkit-color-swatch {
      border: 0;
      border-radius: 10px;
    }

    .qd-palette-preview {
      display: flex;
      overflow: hidden;
      min-height: 46px;
      border-radius: 16px;
      border: 1px solid rgba(244, 241, 234, 0.1);
      background: rgba(255, 255, 255, 0.025);
    }

    .qd-palette-preview span {
      flex: 1;
      min-width: 42px;
    }

    .qd-empty-palette {
      display: grid;
      place-items: center;
      width: 100%;
      color: var(--fg3);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .qd-color-chip-list,
    .qd-suggested-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .qd-color-chip {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(244, 241, 234, 0.12);
      background: rgba(255, 255, 255, 0.025);
      color: var(--fg2);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .qd-color-swatch {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid rgba(244, 241, 234, 0.18);
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
    }

    .qd-color-chip button {
      border: 0;
      background: transparent;
      color: var(--fg3);
      cursor: pointer;
      font-family: var(--font-mono);
      transition: color 180ms var(--ease-out);
    }

    .qd-color-chip button:hover {
      color: var(--err);
    }

    .qd-suggested-color {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(244, 241, 234, 0.16);
      cursor: pointer;
      transition: transform 180ms var(--ease-out), box-shadow 180ms var(--ease-out), border-color 180ms var(--ease-out);
    }

    .qd-suggested-color:hover {
      transform: translateY(-2px) scale(1.04);
      border-color: rgba(166, 240, 79, 0.55);
      box-shadow: 0 0 24px rgba(166, 240, 79, 0.12);
    }

    .qd-counter-field {
      position: relative;
      overflow: hidden;
    }

    .qd-counter-field::after {
      content: '';
      position: absolute;
      inset: auto -20% -45% auto;
      width: 260px;
      height: 260px;
      pointer-events: none;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(166, 240, 79, 0.13), transparent 68%);
      filter: blur(10px);
    }

    .qd-counter-shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 76px 1fr 76px;
      gap: 14px;
      align-items: stretch;
      min-height: 132px;
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(166, 240, 79, 0.18);
      background:
        linear-gradient(135deg, rgba(166, 240, 79, 0.07), rgba(255, 255, 255, 0.015)),
        rgba(12, 13, 16, 0.82);
      box-shadow:
        inset 0 0 0 1px rgba(166, 240, 79, 0.05),
        0 0 34px rgba(166, 240, 79, 0.04);
    }

    .qd-counter-btn {
      border: 1px solid rgba(166, 240, 79, 0.28);
      border-radius: 18px;
      background:
        radial-gradient(circle at 50% 20%, rgba(166, 240, 79, 0.16), rgba(255, 255, 255, 0.025)),
        rgba(10, 11, 13, 0.92);
      color: var(--acid);
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 500;
      cursor: pointer;
      transition:
        transform 180ms var(--ease-out),
        border-color 180ms var(--ease-out),
        box-shadow 180ms var(--ease-out),
        background 180ms var(--ease-out);
    }

    .qd-counter-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(166, 240, 79, 0.65);
      box-shadow: 0 0 30px rgba(166, 240, 79, 0.16);
    }

    .qd-counter-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .qd-counter-display {
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      border-radius: 20px;
      border: 1px solid rgba(244, 241, 234, 0.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.015)),
        rgba(10, 11, 13, 0.78);
    }

    .qd-counter-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(166, 240, 79, 0.08), transparent);
      transform: translateX(-100%);
      animation: qd-counter-scan 3.6s ease-in-out infinite;
    }

    .qd-counter-value {
      position: relative;
      z-index: 1;
      font-family: var(--font-display);
      font-size: clamp(56px, 8vw, 88px);
      font-weight: 700;
      line-height: 0.85;
      letter-spacing: -0.08em;
      color: var(--bone);
      text-shadow: 0 0 32px rgba(166, 240, 79, 0.16);
    }

    .qd-counter-direct {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: center;
      margin-top: 14px;
    }

    .qd-counter-direct span {
      color: var(--fg3);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .qd-counter-input {
      text-align: center;
      font-family: var(--font-mono);
    }

    .qd-counter-input::-webkit-outer-spin-button,
    .qd-counter-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .qd-counter-input {
      -moz-appearance: textfield;
    }

    .qd-module-groups {
      display: grid;
      gap: 18px;
    }

    .qd-module-group {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(244, 241, 234, 0.08);
      background: rgba(255, 255, 255, 0.018);
    }

    .qd-module-group-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      margin-bottom: 14px;
    }

    .qd-module-group-head span {
      color: var(--acid);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .qd-module-group-head small {
      color: var(--fg3);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .qd-module-grid {

      },
      languagesNeeded: {

      },
      domainName: {

      },
      hasExistingWebsite: {

        label: { en: 'Existing website?', ar: 'هل لديك موقع إلكتروني حالي؟' },
        options: [

        ]
      },
      existingWebsiteLink: {
        type: 'textarea',

        placeholderKey: 'existingWebsiteLink'
      },
      supportLevel: {
        type: 'radio',
        label: { en: 'Preferred support level after launch', ar: 'مستوى الدعم المفضل بعد الإطلاق' },
        options: [
          { value: 'basic_care', label: { en: 'Basic care', ar: 'رعاية أساسية' }, note: { en: 'Occasional fixes', ar: 'إصلاحات عرضية' } },
          { value: 'occasional_help', label: { en: 'Occasional help', ar: 'مساعدة دورية' }, note: { en: 'Monthly updates', ar: 'تحديثات شهرية' } },
          { value: 'regular_care', label: { en: 'Regular care', ar: 'رعاية منتظمة' }, note: { en: 'Weekly updates', ar: 'تحديثات أسبوعية' } },
          { value: 'full_support', label: { en: 'Full support', ar: 'دعم كامل' }, note: { en: 'We handle everything', ar: 'نتولى كل شيء' } }
        ]
      },
      optionalServices: {
        type: 'checkbox',
        label: { en: 'Are you interested in any of the following?', ar: 'هل أنت مهتم بأي مما يلي؟' },
        options: [
          { value: 'logo_design', label: { en: 'Logo design', ar: 'تصميم الشعار' } },
          { value: 'social_media_setup_management', label: { en: 'Social media setup & management', ar: 'إعداد وسائل التواصل الاجتماعي وإدارتها' } },
          { value: 'google_business_optimization', label: { en: 'Google Business optimization', ar: 'تحسين جوجل بزنس' } },
          { value: 'product_photography', label: { en: 'Product photography', ar: 'تصوير المنتجات' } },
          { value: 'content_writing', label: { en: 'Content writing', ar: 'كتابة المحتوى' } },
          { value: 'paid_ads', label: { en: 'Paid ads', ar: 'الإعلانات المدفوعة' }, note: { en: 'Google / Meta', ar: 'جوجل / ميتا' } },
          { value: 'promotional_videos', label: { en: 'Promotional videos', ar: 'مقاطع الفيديو الترويجية' } },
          { value: 'multi_location_setup', label: { en: 'Multi-location setup', ar: 'إعداد متعدد المواقع' } }
        ]
      }
    };

    const steps = [
      { id: 'business', title: { en: 'Business Information', ar: 'معلومات النشاط التجاري' }, fields: ['businessName', 'businessEmail', 'businessPhone', 'industry', 'businessDescription', 'socialLinks'] },
      { id: 'goals', title: { en: 'Website Goals', ar: 'أهداف الموقع الإلكتروني' }, fields: ['mainPurpose', 'visitorAction', 'idealCustomer'] },
      { id: 'branding', title: { en: 'Branding & Design', ar: 'العلامة التجارية والتصميم' }, fields: ['hasLogo', 'hasBrandAssets', 'preferredColors', 'colorsToAvoid', 'preferredStyle'] },
      { id: 'content', title: { en: 'Website Pages & Content', ar: 'صفحات الموقع والمحتوى' }, fields: ['neededPages', 'productCount', 'contentReadiness', 'legalPages'] },
      { id: 'features', title: { en: 'Features & Functionality', ar: 'المميزات والوظائف' }, fields: ['requiredFeatures', 'customFeatures'] },
      { id: 'scope', title: { en: 'Project Scope & Timeline', ar: 'نطاق المشروع والجدول الزمني' }, fields: ['budgetRange', 'launchDate', 'urgency', 'workedWithAgency'] },
      { id: 'competitors', title: { en: 'Competitors & Inspiration', ar: 'المنافسون والإلهام' }, fields: ['inspirationSites', 'competitors'] },
      { id: 'technical', title: { en: 'Technical Setup', ar: 'الإعداد التقني' }, fields: ['hasDomain', 'domainName', 'hasExistingWebsite', 'existingWebsiteLink'] },
      { id: 'support', title: { en: 'Maintenance & Support', ar: 'صيانة الموقع والدعم' }, fields: ['supportLevel'] },
      { id: 'services', title: { en: 'Optional Services', ar: 'الخدمات الاختيارية' }, fields: ['optionalServices'] },
      { id: 'review', title: { en: 'Review & Submit', ar: 'المراجعة والإرسال' }, fields: [] }
    ];

    const getEmptyValue = (field) => {
      if (field.type === 'checkbox' || field.type === 'colorPalette') return [];
      if (field.type === 'counter') return '';
      return '';
    };
    const optionalFieldIds = new Set([
      'socialLinks',
      'idealCustomer',
      'brandAssets',
      'preferredColors',
      'colorsToAvoid',
      'productCount',
      'languagesNeeded',
      'customFeatures',
      'inspirationSites',
      'competitors',
      'optionalServices'
    ]);
    const embeddedFieldIds = new Set(['domainName', 'existingWebsiteLink']);
    const pasteFieldIds = new Set(['inspirationSites', 'socialLinks']);

    const isVisibleField = (fieldId, formData) => {
      if (fieldId === 'domainName') return formData.hasDomain === 'yes';
      if (fieldId === 'existingWebsiteLink') return formData.hasExistingWebsite === 'yes';
      return true;
    };

    const isFieldRequired = (fieldId, formData) => {
      if (!isVisibleField(fieldId, formData)) return false;
      if (fieldId === 'domainName') return formData.hasDomain === 'yes';
      if (fieldId === 'existingWebsiteLink') return formData.hasExistingWebsite === 'yes';
      return !optionalFieldIds.has(fieldId);
    };

    const isFieldAnswered = (field, formData) => {
      if (!isVisibleField(field.id, formData)) return true;
      if (!isFieldRequired(field.id, formData)) return true;
      if (field.type === 'counter') {
        return formData[field.id] !== '' && formData[field.id] !== null && formData[field.id] !== undefined;
      }
      const value = formData[field.id];
      if (field.type === 'checkbox') {
        if (!Array.isArray(value) || value.length === 0) return false;
        if (field.id === 'requiredFeatures' && value.includes('multi_language')) {
          return Boolean(formData.requiredFeatures__multi_language_languages?.trim());
        }
        const selectedOtherOption = field.options?.find((option) => option.hasOtherText && value.includes(option.value));
        if (selectedOtherOption) {
          return Boolean(formData[`${field.id}__other`]?.trim());
        }
        return true;
      }
      if (field.type === 'email') {
        const emailValue = typeof value === 'string' ? value.trim() : '';
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailValue);
      }
      return typeof value === 'string' ? value.trim().length > 0 : Boolean(value);
    };

    const hasFieldValue = (field, formData) => {
      if (!isVisibleField(field.id, formData)) return false;

      const value = formData[field.id];

      if (field.type === 'counter') {
        return formData[field.id] !== '' && formData[field.id] !== null && formData[field.id] !== undefined;
      }

      if (field.type === 'colorPalette') {
        return Array.isArray(value) && value.length > 0;
      }

      if (field.type === 'checkbox') {
        if (Array.isArray(value) && value.length > 0) return true;

        const hasOtherValue = field.options?.some((option) =>
          option.hasOtherText && formData[`${field.id}__other`]?.trim()
        );

        return Boolean(hasOtherValue);
      }

      if (field.type === 'radio') {
        return Boolean(value);
      }

      return typeof value === 'string' && value.trim().length > 0;
    };

    const App = () => {
      const [language, setLanguage] = useState(() => localStorage.getItem(LANGUAGE_STORAGE_KEY) || 'en');
      const [currentStep, setCurrentStep] = useState(0);
      const [submitted, setSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState('');
      const [showStepValidation, setShowStepValidation] = useState(false);
      const [activeColor, setActiveColor] = useState('#A6F04F');
      const [hexInput, setHexInput] = useState('#A6F04F');
      const [formData, setFormData] = useState(() => {
        const initial = {};
        Object.entries(fieldCatalog).forEach(([key, field]) => {
          initial[key] = getEmptyValue(field);
          if (field.options) {
            field.options.forEach((option) => {
              if (option.hasOtherText) initial[`${key}__other`] = '';
            });
          }
        });
        initial.requiredFeatures__multi_language_languages = '';
        return initial;
      });

      const locale = text[language];
      const direction = language === 'ar' ? 'rtl' : 'ltr';
      const activeStep = steps[currentStep];
      const suggestedColors = ['#A6F04F', '#0A0B0D', '#F4F1EA', '#C8A45D', '#8B7DF7', '#4ABF8A', '#E54B4B', '#1C1E24'];

      const normalizeHex = (value) => {
        const clean = value.trim();
        if (!clean) return '';
        const withHash = clean.startsWith('#') ? clean : `#${clean}`;
        return withHash.toUpperCase();
      };

      const isValidHex = (value) => /^#([0-9A-F]{3}){1,2}$/i.test(value);

      const clampNumber = (value, min = 0, max = 999) => {
        const number = Number(value);
        if (Number.isNaN(number)) return '';
        return Math.min(max, Math.max(min, number));
      };

      const updateCounter = (fieldId, nextValue, min = 0, max = 999) => {
        const clamped = clampNumber(nextValue, min, max);
        setFormData((prev) => ({ ...prev, [fieldId]: clamped }));
        setShowStepValidation(false);
      };

      const incrementCounter = (field, direction) => {
        const current = formData[field.id] === '' ? 0 : Number(formData[field.id]);
        const next = current + direction * (field.step || 1);
        updateCounter(field.id, next, field.min ?? 0, field.max ?? 999);
      };

      const addColor = (fieldId, color) => {
        const hex = normalizeHex(color);
        if (!isValidHex(hex)) return;

        setFormData((prev) => {
          const current = Array.isArray(prev[fieldId]) ? prev[fieldId] : [];
          if (current.includes(hex)) return prev;
          return { ...prev, [fieldId]: [...current, hex] };
        });

        setActiveColor(hex);
        setHexInput(hex);
        setShowStepValidation(false);
      };

      const removeColor = (fieldId, color) => {
        setFormData((prev) => {
          const current = Array.isArray(prev[fieldId]) ? prev[fieldId] : [];
          return { ...prev, [fieldId]: current.filter((item) => item !== color) };
        });

        setShowStepValidation(false);
      };

      const pasteIntoField = async (fieldId) => {
        try {
          if (!navigator.clipboard?.readText) return;
          const clip = await navigator.clipboard.readText();
          if (!clip?.trim()) return;

          setFormData((prev) => {
            const current = prev[fieldId] || '';
            const nextValue = current.trim()
              ? `${current.trim()}\n${clip.trim()}`
              : clip.trim();

            return { ...prev, [fieldId]: nextValue };
          });

          setShowStepValidation(false);
        } catch (error) {
          console.warn('Clipboard paste unavailable:', error);
        }
      };

      useEffect(() => {
        localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
        document.documentElement.lang = language === 'ar' ? 'ar' : 'en';
        document.documentElement.dir = direction;
        document.body.dir = direction;
      }, [direction, language]);

      const activeStepFields = useMemo(() => (
        activeStep.fields
          .map((fieldId) => ({ id: fieldId, ...fieldCatalog[fieldId] }))
          .filter((field) => isVisibleField(field.id, formData))
      ), [activeStep.fields, formData]);

      const visibleFields = useMemo(() => (
        activeStepFields
          .filter((field) => isVisibleField(field.id, formData) && !embeddedFieldIds.has(field.id))
      ), [activeStepFields, formData]);

      const currentStepComplete = useMemo(() => {
        if (activeStep.id === 'review') return true;
        const requiredFields = activeStepFields.filter((field) => isFieldRequired(field.id, formData));
        if (requiredFields.length === 0) return true;
        return requiredFields.every((field) => isFieldAnswered(field, formData));
      }, [activeStep.id, activeStepFields, formData]);

      const stepCompletion = useMemo(() => steps.map((step, index) => {
        if (step.id === 'review') return currentStep === steps.length - 1;
        const stepFields = step.fields
          .map((fieldId) => ({ id: fieldId, ...fieldCatalog[fieldId] }))
          .filter((field) => isVisibleField(field.id, formData));
        if (!stepFields.length) return false;
        const requiredFields = stepFields.filter((field) => isFieldRequired(field.id, formData));
        const hasAnyUserInput = stepFields.some((field) => hasFieldValue(field, formData));
        if (requiredFields.length === 0) {
          return hasAnyUserInput;
        }
        return requiredFields.every((field) => isFieldAnswered(field, formData));
      }), [currentStep, formData]);

      const totalAnswerableFields = useMemo(() => (
        Object.entries(fieldCatalog).filter(([fieldId]) => isFieldRequired(fieldId, formData)).length
      ), [formData]);

      const answeredFieldsCount = useMemo(() => (
        Object.entries(fieldCatalog)
          .filter(([fieldId]) => isFieldRequired(fieldId, formData))
          .filter(([fieldId, field]) => isFieldAnswered({ id: fieldId, ...field }, formData))
          .length
      ), [formData]);

      const progressPercent = totalAnswerableFields ? (answeredFieldsCount / totalAnswerableFields) * 100 : 0;

      const updateField = (fieldId, value) => {
        const nextValue = fieldId === 'budgetRange' ? value.replace(/\D+/g, '') : value;
        setFormData((prev) => ({ ...prev, [fieldId]: nextValue }));
        setShowStepValidation(false);
      };

      const toggleCheckbox = (fieldId, value) => {
        setFormData((prev) => {
          const current = Array.isArray(prev[fieldId]) ? prev[fieldId] : [];
          const removing = current.includes(value);
          const next = removing
            ? current.filter((item) => item !== value)
            : [...current, value];
          if (fieldId === 'requiredFeatures' && value === 'multi_language' && removing) {
            return {
              ...prev,
              [fieldId]: next,
              requiredFeatures__multi_language_languages: ''
            };
          }
          return { ...prev, [fieldId]: next };
        });
        setShowStepValidation(false);
      };

      const goToStep = (index) => {
        if (index <= currentStep || stepCompletion[index]) {
          setCurrentStep(index);
          setShowStepValidation(false);
          return;
        }
        setShowStepValidation(true);
      };

      const goNextStep = () => {
        if (!currentStepComplete) {
          setShowStepValidation(true);
          return;
        }
        setCurrentStep((step) => step + 1);
        setShowStepValidation(false);
      };

      const getOptionSelected = (field, optionValue) => {
        const value = formData[field.id];
        if (field.type === 'checkbox') return Array.isArray(value) && value.includes(optionValue);
        return value === optionValue;
      };

      const getFieldSummary = (field) => {
        if (!isVisibleField(field.id, formData)) return '';
        const value = formData[field.id];
        if (field.type === 'counter') {
          return value === '' || value === null || value === undefined ? '' : String(value);
        }
        if (field.type === 'colorPalette') {
          return Array.isArray(value) && value.length ? value.join(', ') : '';
        }
        if (field.type === 'checkbox') {
          if (!Array.isArray(value) || value.length === 0) return '';
          return value.map((item) => {
            const option = field.options.find((entry) => entry.value === item);
            const base = option ? option.label[language] : item;
            if (field.id === 'requiredFeatures' && item === 'multi_language') {
              const selectedLanguages = formData.requiredFeatures__multi_language_languages?.trim();
              return selectedLanguages ? `${base}: ${selectedLanguages}` : base;
            }
            if (option && option.hasOtherText) {
              const otherValue = formData[`${field.id}__other`]?.trim();
              return otherValue ? `${base}: ${otherValue}` : base;
            }
            return base;
          }).join(language === 'ar' ? '، ' : ', ');
        }
        if (field.type === 'radio') {
          if (!value) return '';
          const option = field.options.find((entry) => entry.value === value);
          return option ? option.label[language] : value;
        }
        return value;
      };

      const submitQuestionnaire = async () => {
        if (isSubmitting) return;

        const allRequiredComplete = steps
          .filter((step) => step.id !== 'review')
          .every((step) => {
            const stepFields = step.fields
              .map((fieldId) => ({ id: fieldId, ...fieldCatalog[fieldId] }))
              .filter((field) => isVisibleField(field.id, formData));

            const requiredFields = stepFields.filter((field) => isFieldRequired(field.id, formData));

            if (requiredFields.length === 0) return true;

            return requiredFields.every((field) => isFieldAnswered(field, formData));
          });

        if (!allRequiredComplete) {
          setShowStepValidation(true);
          return;
        }

        setIsSubmitting(true);
        setSubmitError('');

        try {
          if (!window.QDFirebase) {
            throw new Error('Firebase is not initialized. Check firebase.js.');
          }

          const { db, addDoc, collection, serverTimestamp } = window.QDFirebase;

          const payload = {
            language,
            submittedAt: new Date().toISOString(),
            createdAt: serverTimestamp(),
            status: 'New',
            priority: 'Normal',
            notes: '',
            answers: formData,
            businessName: formData.businessName?.trim() || '',
            businessEmail: formData.businessEmail?.trim() || '',
            businessPhone: formData.businessPhone?.trim() || '',
            industry: formData.industry?.trim() || '',
            budgetRange: formData.budgetRange?.trim() || '',
            launchDate: formData.launchDate || '',
            urgency: formData.urgency || '',
            supportLevel: formData.supportLevel || '',
            businessDescription: formData.businessDescription?.trim() || '',
            socialLinks: formData.socialLinks?.trim() || '',
            selectedMainPurpose: getFieldSummary({ id: 'mainPurpose', ...fieldCatalog.mainPurpose }),
            selectedRequiredFeatures: getFieldSummary({ id: 'requiredFeatures', ...fieldCatalog.requiredFeatures }),
            selectedOptionalServices: getFieldSummary({ id: 'optionalServices', ...fieldCatalog.optionalServices }),
            ...formData
          };

          const docRef = await addDoc(collection(db, 'projectSubmissions'), payload);

          console.log('QD Project Questionnaire saved to Firestore:', {
            id: docRef.id,
            businessName: payload.businessName,
            businessEmail: payload.businessEmail,
            status: payload.status
          });

          setSubmitted(true);

          setTimeout(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }, 50);
        } catch (error) {
          console.error('QD Project Questionnaire submission failed:', error);
          setSubmitError(error?.message || locale.submitErrorMessage);
        } finally {
          setIsSubmitting(false);
        }
      };

      const renderField = (field) => {
        const placeholder = field.placeholderKey ? locale.placeholders[field.placeholderKey] : '';
        const note = field.note ? field.note[language] : '';
        const fieldClass = field.type === 'textarea' || field.type === 'checkbox' || field.type === 'radio' || field.type === 'colorPalette' || field.type === 'counter' ? 'qd-field is-full' : 'qd-field';
        const required = isFieldRequired(field.id, formData);
        const selectedValue = formData[field.id];
        const selectedOtherOption = field.options?.find((option) => (
          option.hasOtherText &&
          (field.type === 'checkbox'
            ? Array.isArray(selectedValue) && selectedValue.includes(option.value)
            : selectedValue === option.value)
        ));
        const otherKey = selectedOtherOption ? `${field.id}__other` : null;
        const otherOnlyMissing = Boolean(
          showStepValidation &&
          required &&
          selectedOtherOption &&
          !formData[otherKey]?.trim()
        );
        const missing = showStepValidation && required && !isFieldAnswered(field, formData) && !otherOnlyMissing;
        const requiredLabel = required ? locale.required : locale.optional;

        if (field.type === 'text' || field.type === 'date' || field.type === 'email' || field.type === 'tel') {
          const supportsPaste = pasteFieldIds.has(field.id);
          const inputType = field.type === 'date' ? 'date' : field.type;

          return (
            <div key={field.id} className={`${fieldClass} ${missing ? 'is-error' : ''}`}>
              <div className="qd-label-row">
                <label className="qd-field-label" htmlFor={field.id}>{field.label[language]}</label>
                <span className={`qd-required-pill ${required ? '' : 'is-optional'} ${missing ? 'is-error' : ''}`}>
                  {requiredLabel}
                </span>
              </div>
              {note && <div className="qd-field-note">{note}</div>}
              <div className={`qd-input-wrap ${supportsPaste ? 'has-paste' : ''}`}>
                <input
                  id={field.id}
                  className={`qd-input ${missing ? 'is-error' : ''}`}
                  type={inputType}
                  value={formData[field.id]}
                  placeholder={placeholder}
                  required={required}
                  inputMode={field.id === 'budgetRange' ? 'numeric' : field.type === 'tel' ? 'tel' : field.type === 'email' ? 'email' : undefined}
                  pattern={field.id === 'budgetRange' ? '[0-9]*' : undefined}
                  onChange={(event) => updateField(field.id, event.target.value)}
                />
                {supportsPaste && (
                  <button
                    type="button"
                    className="qd-paste-icon-btn"
                    aria-label={language === 'ar' ? 'لصق' : 'Paste'}
                    title={language === 'ar' ? 'لصق' : 'Paste'}
                    onClick={() => pasteIntoField(field.id)}
                  >
                    ⧉
                  </button>
                )}
              </div>
              {missing && <div className="qd-error-text">{locale.missingField}</div>}
            </div>
          );
        }

        if (field.type === 'textarea') {
          const supportsPaste = pasteFieldIds.has(field.id);

          return (
            <div key={field.id} className={`${fieldClass} ${missing ? 'is-error' : ''}`}>
              <div className="qd-label-row">
                <label className="qd-field-label" htmlFor={field.id}>{field.label[language]}</label>
                <span className={`qd-required-pill ${required ? '' : 'is-optional'} ${missing ? 'is-error' : ''}`}>
                  {requiredLabel}
                </span>
              </div>
              {note && <div className="qd-field-note">{note}</div>}
              <div className={`qd-input-wrap ${supportsPaste ? 'has-paste' : ''}`}>
                <textarea
                  id={field.id}
                  className={`qd-textarea ${missing ? 'is-error' : ''}`}
                  value={formData[field.id]}
                  placeholder={placeholder}
                  required={required}
                  onChange={(event) => updateField(field.id, event.target.value)}
                />
                {supportsPaste && (
                  <button
                    type="button"
                    className="qd-paste-icon-btn"
                    aria-label={language === 'ar' ? 'لصق' : 'Paste'}
                    title={language === 'ar' ? 'لصق' : 'Paste'}
                    onClick={() => pasteIntoField(field.id)}
                  >
                    ⧉
                  </button>
                )}
              </div>
              {missing && <div className="qd-error-text">{locale.missingField}</div>}
            </div>
          );
        }

        if (field.type === 'counter') {
          const value = formData[field.id];
          const displayValue = value === '' ? '—' : value;
          const min = field.min ?? 0;
          const max = field.max ?? 999;

          return (
            <div key={field.id} className={`${fieldClass} qd-counter-field ${missing ? 'is-error' : ''}`}>
              <div className="qd-label-row">
                <label className="qd-field-label" htmlFor={field.id}>
                  {field.label[language]}
                </label>
                <span className={`qd-required-pill ${required ? '' : 'is-optional'} ${missing ? 'is-error' : ''}`}>
                  {requiredLabel}
                </span>
              </div>

              <div className="qd-counter-shell">
                <button
                  type="button"
                  className="qd-counter-btn"
                  onClick={() => incrementCounter(field, -1)}
                  aria-label="Decrease"
                >
                  −
                </button>

                <div className="qd-counter-display">
                  <span className="qd-counter-value">{displayValue}</span>
                </div>

                <button
                  type="button"
                  className="qd-counter-btn"
                  onClick={() => incrementCounter(field, 1)}
                  aria-label="Increase"
                >
                  +
                </button>
              </div>

              <div className="qd-counter-direct">
                <span>{language === 'ar' ? 'أو اكتب الرقم مباشرة' : 'or type the number directly'}</span>
                <input
                  id={field.id}
                  className={`qd-input qd-counter-input ${missing ? 'is-error' : ''}`}
                  type="number"
                  min={min}
                  max={max}
                  value={value}
                  placeholder={language === 'ar' ? 'مثال: 12' : 'e.g. 12'}
                  onChange={(event) => {
                    const raw = event.target.value;
                    if (raw === '') {
                      setFormData((prev) => ({ ...prev, [field.id]: '' }));
                      setShowStepValidation(false);
                      return;
                    }
                    updateCounter(field.id, raw, min, max);
                  }}
                />
              </div>

              {missing && <div className="qd-error-text">{locale.missingField}</div>}
            </div>
          );
        }

        if (field.id === 'requiredFeatures') {
          const multiLanguageSelected =
            Array.isArray(formData.requiredFeatures) &&
            formData.requiredFeatures.includes('multi_language');
          const multiLanguageMissing =
            showStepValidation &&
            multiLanguageSelected &&
            !formData.requiredFeatures__multi_language_languages?.trim();
          const tiers = [
            {
              id: 'tier1',
              title: { en: 'Core business systems', ar: 'أنظمة الأعمال الأساسية' },
              caption: { en: 'Operational stack', ar: 'بنية التشغيل' }
            },
            {
              id: 'tier2',
              title: { en: 'Website growth modules', ar: 'وحدات نمو الموقع' },
              caption: { en: 'Growth layer', ar: 'طبقة النمو' }
            },
            {
              id: 'tier3',
              title: { en: 'Advanced modules', ar: 'وحدات متقدمة' },
              caption: { en: 'Expansion systems', ar: 'أنظمة التوسع' }
            }
          ];
          const helperOption = field.options.find((option) => option.tier === 'helper');

          return (
            <div key={field.id} className={`${fieldClass} ${missing ? 'is-error' : ''}`}>
              <div className="qd-label-row">
                <div className="qd-field-label">{field.label[language]}</div>
                <span className={`qd-required-pill ${required ? '' : 'is-optional'} ${missing ? 'is-error' : ''}`}>
                  {requiredLabel}
                </span>
              </div>
              {note && <div className="qd-field-note">{note}</div>}

              <div className={`qd-module-groups ${missing ? 'is-error' : ''}`}>
                {tiers.map((tier) => (
                  <div className="qd-module-group" key={tier.id}>
                    <div className="qd-module-group-head">
                      <span>{tier.title[language]}</span>
                      <small>{tier.caption[language]}</small>
                    </div>

                    <div className="qd-module-grid">
                      {field.options.filter((option) => option.tier === tier.id).map((option) => {
                        const selected = getOptionSelected(field, option.value);
                        return (
                          <div className="qd-module-item" key={option.value}>
                            <label className={`qd-module-card ${selected ? 'is-selected' : ''}`}>
                              <input
                                type="checkbox"
                                checked={selected}
                                required={required}
                                onChange={() => toggleCheckbox(field.id, option.value)}
                              />
                              <span className="qd-module-icon">{option.icon}</span>
                              <span className="qd-module-copy">
                                <strong>{option.label[language]}</strong>
                                <small>{option.description?.[language]}</small>
                              </span>
                            </label>

                            {option.value === 'multi_language' && selected && (
                              <div className="qd-module-followup">
                                <label className="qd-module-followup-label">
                                  {language === 'ar' ? 'ما اللغات التي تحتاجها؟' : 'Which languages do you need?'}
                                </label>
                                <input
                                  className={`qd-input qd-module-followup-input ${multiLanguageMissing ? 'is-error' : ''}`}
                                  type="text"
                                  value={formData.requiredFeatures__multi_language_languages || ''}
                                  placeholder={language === 'ar' ? 'العربية، الإنجليزية، الفرنسية...' : 'English, Arabic, French...'}
                                  onChange={(event) => updateField('requiredFeatures__multi_language_languages', event.target.value)}
                                />
                                {multiLanguageMissing && (
                                  <div className="qd-error-text">{locale.missingLanguages}</div>
                                )}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}

                {helperOption && (
                  <div className="qd-module-group">
                    <div className="qd-module-group-head">
                      <span>{language === 'ar' ? 'الدعم في الاختيار' : 'Selection support'}</span>
                      <small>{language === 'ar' ? 'سنقترح البنية المناسبة' : 'We can recommend the stack'}</small>
                    </div>

                    <div className="qd-module-grid">
                      {(() => {
                        const selected = getOptionSelected(field, helperOption.value);
                        return (
                          <label key={helperOption.value} className={`qd-module-card ${selected ? 'is-selected' : ''}`}>
                            <input
                              type="checkbox"
                              checked={selected}
                              required={required}
                              onChange={() => toggleCheckbox(field.id, helperOption.value)}
                            />
                            <span className="qd-module-icon">{helperOption.icon}</span>
                            <span className="qd-module-copy">
                              <strong>{helperOption.label[language]}</strong>
                              <small>{helperOption.description?.[language]}</small>
                            </span>
                          </label>
                        );
                      })()}
                    </div>
                  </div>
                )}
              </div>

              {missing && <div className="qd-error-text">{locale.missingField}</div>}
            </div>
          );
        }

        if (field.type === 'colorPalette') {
          const palette = Array.isArray(formData[field.id]) ? formData[field.id] : [];
          const normalizedHexInput = normalizeHex(hexInput);
          const canAddColor = isValidHex(normalizedHexInput);

          return (
            <div key={field.id} className={fieldClass}>
              <div className="qd-label-row">
                <label className="qd-field-label" htmlFor={field.id}>{field.label[language]}</label>
                <span className={`qd-required-pill ${required ? '' : 'is-optional'}`}>
                  {requiredLabel}
                </span>
              </div>
              <div className="qd-color-picker">
                <div className="qd-color-controls">
                  <input
                    id={field.id}
                    className="qd-color-wheel"
                    type="color"
                    value={activeColor}
                    onChange={(event) => {
                      const next = normalizeHex(event.target.value);
                      setActiveColor(next);
                      setHexInput(next);
                    }}
                  />
                  <input
                    className="qd-input"
                    type="text"
                    value={hexInput}
                    placeholder="#A6F04F"
                    onChange={(event) => setHexInput(event.target.value.toUpperCase())}
                  />
                  <button
                    type="button"
                    className="qd-btn qd-btn-ghost qd-btn-sm"
                    onClick={() => addColor(field.id, hexInput)}
                    disabled={!canAddColor}
                  >
                    {locale.addColor}
                  </button>
                </div>

                <div>
                  <div className="qd-field-note" style={{ marginTop: 0 }}>{locale.selectedPalette}</div>
                  <div className="qd-palette-preview">
                    {palette.length ? (
                      palette.map((color) => <span key={color} style={{ background: color }} />)
                    ) : (
                      <div className="qd-empty-palette">{locale.noColorsSelected}</div>
                    )}
                  </div>
                </div>

                {palette.length > 0 && (
                  <div className="qd-color-chip-list">
                    {palette.map((color) => (
                      <div key={color} className="qd-color-chip">
                        <span className="qd-color-swatch" style={{ background: color }} />
                        <span>{color}</span>
                        <button type="button" onClick={() => removeColor(field.id, color)}>×</button>
                      </div>
                    ))}
                  </div>
                )}

                <div>
                  <div className="qd-field-note" style={{ marginTop: 0 }}>{locale.suggestedColors}</div>
                  <div className="qd-suggested-colors">
                    {suggestedColors.map((color) => (
                      <button
                        key={color}
                        type="button"
                        className="qd-suggested-color"
                        style={{ background: color }}
                        aria-label={color}
                        onClick={() => addColor(field.id, color)}
                      />
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div key={field.id} className={`${fieldClass} ${missing ? 'is-error' : ''}`}>
            <div className="qd-label-row">
              <div className="qd-field-label">{field.label[language]}</div>
              <span className={`qd-required-pill ${required ? '' : 'is-optional'} ${missing ? 'is-error' : ''}`}>
                {requiredLabel}
              </span>
            </div>
            {note && <div className="qd-field-note">{note}</div>}
            <div className={`qd-options ${missing ? 'is-error' : ''}`}>
              {field.options.map((option) => {
                const selected = getOptionSelected(field, option.value);
                const otherKey = `${field.id}__other`;
                const otherMissing =
                  showStepValidation &&
                  option.hasOtherText &&
                  selected &&
                  required &&
                  !formData[otherKey]?.trim();
                return (
                  <div key={option.value}>
                    <label className={`qd-option ${field.type === 'checkbox' ? 'is-checkbox' : ''} ${selected ? 'is-selected' : ''}`}>
                      <input
                        type={field.type}
                        name={field.id}
                        checked={selected}
                        required={required}
                        onChange={() => {
                          if (field.type === 'checkbox') toggleCheckbox(field.id, option.value);
                          else updateField(field.id, option.value);
                        }}
                      />
                      <span className="qd-option-mark" />
                      <span className="qd-option-copy">
                        <strong>{option.label[language]}</strong>
                        {option.note && <span>{option.note[language]}</span>}
                      </span>
                    </label>
                    {option.hasOtherText && selected && (
                      <div className="qd-other-wrap">
                        <input
                          className={`qd-input ${otherMissing ? 'is-error' : ''}`}
                          type="text"
                          value={formData[otherKey]}
                          placeholder={locale.placeholders[option.otherPlaceholderKey]}
                          required={required && selected}
                          onChange={(event) => updateField(otherKey, event.target.value)}
                        />
                        {otherMissing && <div className="qd-error-text">{locale.missingField}</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {field.id === 'hasDomain' && formData.hasDomain === 'yes' && (
              <div className="qd-embedded-field">
                <div className="qd-embedded-label-row">
                  <label className="qd-module-followup-label" htmlFor="domainName">
                    {language === 'ar' ? 'اسم النطاق' : 'Domain name'}
                  </label>
                </div>
                <div className="qd-input-wrap has-paste">
                  <input
                    id="domainName"
                    className={`qd-input ${showStepValidation && formData.hasDomain === 'yes' && !formData.domainName?.trim() ? 'is-error' : ''}`}
                    type="text"
                    value={formData.domainName || ''}
                    placeholder="yourbrand.com"
                    onChange={(event) => updateField('domainName', event.target.value)}
                  />
                  <button
                    type="button"
                    className="qd-paste-icon-btn"
                    aria-label={language === 'ar' ? 'لصق' : 'Paste'}
                    title={language === 'ar' ? 'لصق' : 'Paste'}
                    onClick={() => pasteIntoField('domainName')}
                  >
                    ⧉
                  </button>
                </div>
                {showStepValidation && formData.hasDomain === 'yes' && !formData.domainName?.trim() && (
                  <div className="qd-error-text">{locale.missingField}</div>
                )}
              </div>
            )}
            {field.id === 'hasExistingWebsite' && formData.hasExistingWebsite === 'yes' && (
              <div className="qd-embedded-field">
                <div className="qd-embedded-label-row">
                  <label className="qd-module-followup-label" htmlFor="existingWebsiteLink">
                    {language === 'ar' ? 'رابط الموقع الحالي' : 'Existing website link'}
                  </label>
                </div>
                <div className="qd-input-wrap has-paste">
                  <input
                    id="existingWebsiteLink"
                    className={`qd-input ${showStepValidation && formData.hasExistingWebsite === 'yes' && !formData.existingWebsiteLink?.trim() ? 'is-error' : ''}`}
                    type="text"
                    value={formData.existingWebsiteLink || ''}
                    placeholder="https://yourwebsite.com"
                    onChange={(event) => updateField('existingWebsiteLink', event.target.value)}
                  />
                  <button
                    type="button"
                    className="qd-paste-icon-btn"
                    aria-label={language === 'ar' ? 'لصق' : 'Paste'}
                    title={language === 'ar' ? 'لصق' : 'Paste'}
                    onClick={() => pasteIntoField('existingWebsiteLink')}
                  >
                    ⧉
                  </button>
                </div>
                {showStepValidation && formData.hasExistingWebsite === 'yes' && !formData.existingWebsiteLink?.trim() && (
                  <div className="qd-error-text">{locale.missingField}</div>
                )}
              </div>
            )}
            {missing && <div className="qd-error-text">{locale.missingField}</div>}
          </div>
        );
      };

      if (submitted) {
        return (
          <div className="qd-contact-shell">
            <header className="qd-contact-header">
              <a href="index.html" className="qd-logo-lockup">
                <img src="assets/qd-logo.jpeg" alt="QD Systems" />
                <div>
                  <div className="qd-eyebrow">{locale.eyebrow}</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--fg1)' }}>{locale.siteTitle}</div>
                </div>
              </a>
              <div className="qd-contact-actions">
                <a href="index.html" className="qd-back-link">← {locale.backHome}</a>
                <div className="qd-language-toggle">
                  {['en', 'ar'].map((code) => (
                    <button key={code} type="button" className={language === code ? 'is-active' : ''} onClick={() => setLanguage(code)}>
                      {code.toUpperCase()}
                    </button>
                  ))}
                </div>
              </div>
            </header>

            <section className="qd-submit-success">
              <div className="qd-success-orbit">
                <span>✓</span>
              </div>

              <div className="qd-eyebrow" style={{ color: 'var(--acid)' }}>
                {language === 'ar' ? 'QD SYSTEMS · تم إكمال الاستبيان' : 'QD SYSTEMS · INTAKE COMPLETE'}
              </div>

              <h1>
                {language === 'ar' ? 'تم استلام طلب المشروع.' : 'Build request received.'}
              </h1>

              <p>
                {language === 'ar'
                  ? 'شكراً لك. تم استلام تفاصيل مشروعك وسنراجع أفضل حل مناسب لعملك.'
                  : 'Thank you. We received your project details and will review the best solution for your business.'}
              </p>

              <div className="qd-success-actions">
                <a href="index.html" className="qd-btn qd-btn-primary qd-btn-md">
                  {language === 'ar' ? 'العودة للرئيسية' : 'Return home'}
                </a>

                <button
                  type="button"
                  className="qd-btn qd-btn-ghost qd-btn-md"
                  onClick={() => {
                    setSubmitted(false);
                    setCurrentStep(0);
                    setShowStepValidation(false);
                    setTimeout(() => {
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 50);
                  }}
                >
                  {language === 'ar' ? 'إرسال طلب آخر' : 'Submit another request'}
                </button>
              </div>
            </section>
          </div>
        );
      }

      return (
        <div className="qd-contact-shell">
          <header className="qd-contact-header">
            <a href="index.html" className="qd-logo-lockup">
              <img src="assets/qd-logo.jpeg" alt="QD Systems" />
              <div>
                <div className="qd-eyebrow">{locale.eyebrow}</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--fg1)' }}>{locale.siteTitle}</div>
              </div>
            </a>
            <div className="qd-contact-actions">
              <a href="index.html" className="qd-back-link">← {locale.backHome}</a>
              <div className="qd-language-toggle">
                {['en', 'ar'].map((code) => (
                  <button key={code} type="button" className={language === code ? 'is-active' : ''} onClick={() => setLanguage(code)}>
                    {code.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <section className="qd-contact-hero">
            <div className="qd-hero-copy">
              <div className="qd-eyebrow" style={{ color: 'var(--acid)' }}>{locale.eyebrow}</div>
              <h1>{locale.heroTitle}</h1>
              <p>{locale.heroSubtitle}</p>
            </div>
            <aside className="qd-hero-side">
              <strong>{locale.microcopy}</strong>
              <p>{locale.sideBody}</p>
              <div className="qd-pulse-bar"><span /></div>
            </aside>
          </section>

          <section className="qd-contact-layout">
            <div className="qd-form-card">
              <div className="qd-progress-meta">
                <span>{locale.stepLabel} {currentStep + 1} {locale.ofLabel} {steps.length}</span>
                <span>{Math.round(progressPercent)}%</span>
              </div>
              <div className="qd-progress-track">
                <div className="qd-progress-fill" style={{ width: `${progressPercent}%` }} />
              </div>

              <div className="qd-step-shell">
                <div key={activeStep.id} className="qd-step-panel">
                  <div className="qd-step-head">
                    <div className="qd-eyebrow" style={{ color: 'var(--acid)' }}>{steps[currentStep].title[language]}</div>
                    <h2>{currentStep === steps.length - 1 ? locale.reviewHeading : steps[currentStep].title[language]}</h2>
                    <p>{currentStep === steps.length - 1 ? locale.reviewDescription : locale.stepDescriptions[activeStep.id]}</p>
                  </div>

                  {activeStep.id !== 'review' ? (
                    <div className="qd-form-grid">
                      {visibleFields.map(renderField)}
                    </div>
                  ) : (
                    <div className="qd-review-grid">
                      {steps.slice(0, -1).map((step) => (
                        <div key={step.id} className="qd-review-card">
                          <h3>{step.title[language]}</h3>
                          {step.fields
                            .map((fieldId) => ({ id: fieldId, ...fieldCatalog[fieldId] }))
                            .filter((field) => isVisibleField(field.id, formData))
                            .map((field) => {
                              const summary = getFieldSummary(field);
                              return (
                                <div key={field.id} className="qd-review-item">
                                  <strong>{field.label[language]}</strong>
                                  <span>{summary || locale.reviewEmpty}</span>
                                </div>
                              );
                            })}
                        </div>
                      ))}
                      <div className="qd-field is-full">
                        <div className="qd-field-note">{locale.reviewHint}</div>
                      </div>
                    </div>
                  )}
                </div>

                <div className="qd-nav-row">
                  <div className="qd-nav-cluster">
                    {currentStep > 0 && (
                      <button type="button" className="qd-btn qd-btn-ghost qd-btn-md" onClick={() => { setCurrentStep((step) => step - 1); setShowStepValidation(false); }}>
                        {locale.previous}
                      </button>
                    )}
                  </div>
                  <div className="qd-nav-cluster">
                    {currentStep < steps.length - 1 ? (
                      <button type="button" className="qd-btn qd-btn-primary qd-btn-md" onClick={goNextStep}>
                        {locale.next}
                      </button>
                    ) : (
                      <button type="button" className="qd-btn qd-btn-primary qd-btn-md" onClick={submitQuestionnaire} disabled={isSubmitting}>
                        {isSubmitting ? locale.sending : locale.submit}
                      </button>
                    )}
                  </div>
                </div>
                {showStepValidation && activeStep.id !== 'review' && (
                  <div className="qd-validation-note">{locale.requiredNote}</div>
                )}
                {submitError && (
                  <div className="qd-submit-alert" role="alert" aria-live="polite">
                    <strong>{locale.submitErrorTitle}</strong>
                    <span>{submitError}</span>
                  </div>
                )}
              </div>
            </div>

            <aside className="qd-summary-card">
              <div className="qd-eyebrow" style={{ color: 'var(--acid)' }}>{locale.jumpLabel}</div>
              <div className="qd-summary-stats">
                <div className="qd-stat">
                  <strong>{answeredFieldsCount}</strong>
                  <span>{locale.answersCount}</span>
                </div>
                <div className="qd-stat">
                  <strong>{stepCompletion.filter(Boolean).length}</strong>
                  <span>{locale.sectionsDone}</span>
                </div>
              </div>
              <div className="qd-step-list">
                {steps.map((step, index) => {
                  const completed = stepCompletion[index];
                  const suffix = currentStep === index ? locale.current : completed ? locale.complete : '';
                  return (
                    <button
                      key={step.id}
                      type="button"
                      className={`qd-step-pill ${currentStep === index ? 'is-active' : ''} ${completed ? 'is-complete' : ''}`}
                      onClick={() => goToStep(index)}
                    >
                      <span className="qd-step-index">{index + 1}</span>
                      <strong>{step.title[language]}</strong>
                      <span className="qd-step-complete">{suffix}</span>
                    </button>
                  );
                })}
              </div>
              <div className="qd-field-note" style={{ marginTop: 18, marginBottom: 0 }}>
                {answeredFieldsCount} / {totalAnswerableFields}
              </div>
            </aside>
          </section>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('qd-contact-root')).render(<App />);
  </script>
</body>
</html>
