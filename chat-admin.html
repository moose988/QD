<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QD OS — Chat Leads</title>
  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
  <style>
    .qd-chat-admin {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      padding: 24px;
      min-height: calc(100vh - 80px);
    }
    @media (max-width: 880px) {
      .qd-chat-admin { grid-template-columns: 1fr; }
    }
    .qd-chat-admin-tabs {
      display: flex;
      gap: 4px;
      padding: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(244,241,234,0.08);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    .qd-chat-admin-tab {
      flex: 1;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--fg2);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }
    .qd-chat-admin-tab.is-active {
      background: var(--acid);
      color: var(--obsidian);
    }
    .qd-chat-admin-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
    }
    .qd-chat-admin-item {
      padding: 14px 14px;
      border: 1px solid rgba(244,241,234,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease;
    }
    .qd-chat-admin-item:hover {
      border-color: rgba(232,232,238,0.4);
      background: rgba(232,232,238,0.04);
    }
    .qd-chat-admin-item.is-selected {
      border-color: var(--acid);
      background: rgba(232,232,238,0.08);
    }
    .qd-chat-admin-item h4 {
      font-family: var(--font-display);
      font-size: 14px;
      margin: 0 0 4px;
      color: var(--bone);
    }
    .qd-chat-admin-item .qd-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg3);
      margin-bottom: 6px;
    }
    .qd-chat-admin-item .qd-brief {
      font-size: 13px;
      color: var(--fg2);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .qd-chat-admin-detail {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(244,241,234,0.08);
      border-radius: 16px;
      padding: 24px;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }
    .qd-chat-admin-empty {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--fg3);
      font-family: var(--font-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 11px;
    }
    .qd-chat-admin-field {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(244,241,234,0.06);
      font-size: 14px;
    }
    .qd-chat-admin-field-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--fg3);
      padding-top: 2px;
    }
    .qd-chat-admin-field-value {
      color: var(--fg1);
      word-break: break-word;
    }
    .qd-chat-admin-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0;
    }
    .qd-chat-admin-actions a {
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid rgba(244,241,234,0.14);
      background: rgba(255,255,255,0.02);
      color: var(--bone);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 160ms, background 160ms;
    }
    .qd-chat-admin-actions a.is-primary {
      background: var(--acid);
      color: var(--obsidian);
      border-color: var(--acid);
    }
    .qd-chat-admin-actions a:hover {
      border-color: var(--acid);
    }
    .qd-chat-admin-convo {
      margin-top: 16px;
      padding: 16px;
      border: 1px solid rgba(244,241,234,0.08);
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      max-height: 400px;
      overflow-y: auto;
    }
    .qd-chat-admin-bubble {
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .qd-chat-admin-bubble-user {
      background: rgba(232,232,238,0.12);
      border: 1px solid rgba(232,232,238,0.3);
      color: var(--bone);
    }
    .qd-chat-admin-bubble-assistant {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(244,241,234,0.08);
      color: var(--fg1);
    }
    .qd-chat-admin-bubble-meta {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg3);
      margin-bottom: 4px;
    }
    .qd-chat-admin-status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(232,232,238,0.12);
      color: var(--acid);
      border: 1px solid rgba(232,232,238,0.3);
    }
    .qd-chat-admin-status-badge.is-contacted {
      background: rgba(244,241,234,0.06);
      color: var(--fg2);
      border-color: rgba(244,241,234,0.14);
    }
    .qd-chat-admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .qd-chat-admin-header h2 {
      font-family: var(--font-display);
      font-size: 26px;
      color: var(--bone);
      margin: 0;
    }
    .qd-chat-admin-empty-list {
      text-align: center;
      padding: 32px 16px;
      color: var(--fg3);
      font-size: 13px;
    }
  </style>
</head>
<body class="qd-admin-page">
  <div id="qd-chat-admin-root"></div>
  <script type="module" src="chat-admin.js"></script>
</body>
</html>
